name: Cleitin Engine - FoxyCat FM

on:
  schedule:
    - cron: '0 */6 * * *' # Cleitin acorda a cada 6 horas pra colher
  workflow_dispatch:      # Permite que você dê o chicote manualmente

jobs:
  harvest-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          wget https://dist.ipfs.tech/kubo/v0.21.0/kubo_v0.21.0_linux-amd64.tar.gz
          tar -xvzf kubo_v0.21.0_linux-amd64.tar.gz
          sudo bash kubo/install.sh
          ipfs init

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: 🏴‍☠️ Harvester - Cleitin Colhendo
        run: python src/harvester/harvester.py

      - name: 🔑 IPFS Manager - Fundindo CID
        run: |
          ipfs daemon &
          sleep 10
          python src/ipfs_manager/cid_master.py

      - name: 🦊 Site Generator - Fenestrae Build
        run: python src/site_generator/build_site.py

      - name: 🚀 Deploy to Surge.sh
        uses: dswistowski/surge-sh-action@v1
        with:
          domain: 'foxycat-fm.surge.sh'
          project: './public'
          login: ${{ secrets.SURGE_LOGIN }}
          token: ${{ secrets.SURGE_TOKEN }}
