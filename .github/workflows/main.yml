name: CleitinEngine

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  harvester-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🛠️ Install Heavy Tools (yt-dlp & IPFS)
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          wget https://dist.ipfs.tech/kubo/v0.21.0/kubo_v0.21.0_linux-amd64.tar.gz
          tar -xvzf kubo_v0.21.0_linux-amd64.tar.gz
          sudo bash kubo/install.sh
          ipfs init
          pip install -r requirements.txt || echo "Sem requirements.txt"

      - name: 🏴‍☠️ Pilhagem (Harvester)
        run: |
          python src/harvester/harvester.py || echo "Script de pilhagem não encontrado"

      - name: 🔑 CID Master (IPFS Fusion)
        run: |
          ipfs daemon &
          sleep 15
          python src/ipfs_manager/cid_master.py || echo "Script CID não encontrado"

      - name: 🚀 Deploy FoxyCat FM
        uses: dswistowski/surge-sh-action@v1
        with:
          domain: 'foxycat-fm.surge.sh'
          project: './public'
          login: ${{ secrets.SURGE_LOGIN }}
          token: ${{ secrets.SURGE_TOKEN }}
